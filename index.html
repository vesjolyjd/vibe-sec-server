<!DOCTYPE html>
<html>
<head>
    <title>Демо-приложение (безопасная версия)</title>
    <meta charset="utf-8">
</head>
<body>
    <h1>Добро пожаловать в учебное приложение</h1>

    <div id="login">
        <h2>Вход</h2>
        <form method="POST" action="/login">
            <label>Логин: <input type="text" name="username"></label><br>
            <label>Пароль: <input type="password" name="password"></label><br>
            <button type="submit">Войти</button>
        </form>
    </div>

    <hr>

    <div id="comments">
        <h2>Комментарии</h2>
        <form method="POST" action="/comment">
            <input type="text" name="comment" placeholder="Комментарий">
            <input type="hidden" name="csrf_token" id="csrf_token">
            <button type="submit">Отправить</button>
        </form>

        <h3>Список комментариев:</h3>
        <div id="comment-list"></div>
    </div>

    <script>
        // Устанавливаем CSRF-токен из глобальной переменной (переданной сервером)
        document.getElementById('csrf_token').value = window.csrfToken || '';

        function loadComments() {
            fetch('/comments')
                .then(response => response.json())
                .then(comments => {
                    let html = '<ul>';
                    for (let c of comments) {
                        // Экранируем опасные символы
                        let safe = c.replace(/&/g, '&amp;')
                                    .replace(/</g, '&lt;')
                                    .replace(/>/g, '&gt;')
                                    .replace(/"/g, '&quot;')
                                    .replace(/'/g, '&#039;');
                        html += '<li>' + safe + '</li>';
                    }
                    html += '</ul>';
                    document.getElementById('comment-list').innerHTML = html;
                });
        }
        loadComments();
    </script>
</body>
</html>
